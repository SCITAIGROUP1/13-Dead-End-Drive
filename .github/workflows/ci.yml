name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: npm ci
      - name: Install bot-ai (runtime + pytest)
        run: python3 -m pip install -e "./services/bot-ai[dev]"
      - run: npm run typecheck
      - run: npx vitest run --config vitest.config.ts --reporter=verbose
      - run: npm run test:bot-ai
      - run: npm run lint:boundaries
